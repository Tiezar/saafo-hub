version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saafo-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saafo_db
    ports:
      - '5436:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
